<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f14;
  --card: #17171f;
  --card2: #1e1e28;
  --border: #2a2a38;
  --accent: #7c6af7;
  --accent2: #f7566a;
  --accent3: #38e8c4;
  --gold: #f7c948;
  --text: #f0f0f5;
  --muted: #6b6b80;
  --success: #38e8a0;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── NOISE OVERLAY ── */
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: .4;
}

/* ── GLOW BLOBS ── */
.blob1, .blob2 {
  position: fixed; border-radius: 50%; pointer-events: none; z-index:0;
  filter: blur(80px); opacity: .12;
}
.blob1 { width:500px; height:500px; background:var(--accent); top:-150px; left:-100px; }
.blob2 { width:400px; height:400px; background:var(--accent2); bottom:-100px; right:-100px; }

/* ── LAYOUT ── */
#app {
  position: relative; z-index:1;
  max-width: 1100px; margin: 0 auto;
  padding: 24px 16px 60px;
}

/* ── TABS ── */
.tabs {
  display: flex; gap: 6px; margin-bottom: 28px;
  background: var(--card); border-radius: 14px; padding: 5px;
  border: 1px solid var(--border); width: fit-content;
}
.tab {
  font-family: 'Syne', sans-serif; font-size: .85rem; font-weight: 700;
  padding: 9px 22px; border-radius: 10px; cursor: pointer;
  border: none; background: transparent; color: var(--muted);
  transition: all .2s; letter-spacing: .5px;
}
.tab.active {
  background: linear-gradient(135deg, var(--accent), #5b4fd4);
  color: #fff; box-shadow: 0 4px 16px rgba(124,106,247,.35);
}

/* ── SECTION ── */
.section { display: none; }
.section.active { display: block; animation: fadeIn .3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* ── CARD ── */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 24px;
  box-shadow: 0 4px 24px rgba(0,0,0,.25);
}
.card-title {
  font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 800;
  color: var(--muted); letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
}
.card-title::before {
  content:''; display:block; width:4px; height:18px; border-radius:2px;
  background: linear-gradient(var(--accent), var(--accent2));
}

/* ── FORM GRID ── */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
.form-full { grid-column: 1/-1; }

.field label {
  display: block; font-size: .72rem; font-weight: 700;
  color: var(--muted); letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 6px;
}
.field input, .field select, .field textarea {
  width: 100%; background: var(--card2); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 10px 14px;
  color: var(--text); font-family: inherit; font-size: .9rem; font-weight: 500;
  outline: none; transition: border-color .2s, box-shadow .2s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,106,247,.15);
}
.field textarea { resize: vertical; min-height: 70px; }
.field select option { background: var(--card2); }

/* ── LOGO UPLOAD ── */
.logo-area {
  border: 2px dashed var(--border); border-radius: 14px;
  padding: 20px; text-align: center; cursor: pointer;
  transition: all .2s; position: relative; overflow: hidden;
}
.logo-area:hover { border-color: var(--accent); background: rgba(124,106,247,.05); }
.logo-area img { max-height: 80px; max-width: 200px; object-fit: contain; }
.logo-placeholder { color: var(--muted); font-size: .85rem; }
.logo-placeholder span { font-size: 2rem; display: block; margin-bottom: 6px; }
#logoInput { position:absolute; inset:0; opacity:0; cursor:pointer; }

/* ── ITEMS TABLE ── */
.items-wrap { overflow-x: auto; }
.items-table {
  width: 100%; border-collapse: collapse; font-size: .88rem;
}
.items-table th {
  font-size: .68rem; font-weight: 800; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--muted);
  padding: 8px 12px; text-align: left;
  border-bottom: 1px solid var(--border);
}
.items-table td { padding: 8px 6px; vertical-align: middle; }
.items-table input {
  background: var(--card2); border: 1.5px solid transparent;
  border-radius: 8px; padding: 8px 10px;
  color: var(--text); font-family: inherit; font-size: .88rem;
  outline: none; transition: border-color .2s; width: 100%;
}
.items-table input:focus { border-color: var(--accent); }
.item-subtotal { font-weight: 700; color: var(--accent3); font-size: .92rem; white-space: nowrap; }
.btn-del {
  background: rgba(247,86,106,.12); border: none; border-radius: 8px;
  color: var(--accent2); width: 32px; height: 32px;
  cursor: pointer; font-size: 1rem; transition: all .15s;
  display:flex; align-items:center; justify-content:center;
}
.btn-del:hover { background: rgba(247,86,106,.25); }

/* ── BUTTONS ── */
.btn {
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: .9rem;
  border: none; border-radius: 12px; padding: 11px 22px;
  cursor: pointer; transition: all .15s; letter-spacing: .5px;
  display: inline-flex; align-items: center; gap: 7px;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), #5b4fd4);
  color: #fff; box-shadow: 0 4px 16px rgba(124,106,247,.3);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,106,247,.4); }
.btn-secondary {
  background: var(--card2); color: var(--text);
  border: 1.5px solid var(--border);
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.btn-success {
  background: linear-gradient(135deg, #1db87a, #16a86f);
  color: #fff; box-shadow: 0 4px 16px rgba(29,184,122,.25);
}
.btn-danger {
  background: rgba(247,86,106,.12); color: var(--accent2);
  border: 1.5px solid rgba(247,86,106,.2);
}
.btn-danger:hover { background: rgba(247,86,106,.22); }

.btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
.btn-add-item {
  width: 100%; margin-top: 10px; justify-content: center;
  background: rgba(124,106,247,.08); color: var(--accent);
  border: 1.5px dashed rgba(124,106,247,.3); border-radius: 10px;
  padding: 10px;
}
.btn-add-item:hover { background: rgba(124,106,247,.15); }

/* ── TOTALS ── */
.totals-box {
  background: var(--card2); border-radius: 14px; padding: 18px 20px;
  border: 1px solid var(--border); min-width: 280px;
}
.total-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 0; font-size: .9rem;
}
.total-row + .total-row { border-top: 1px solid var(--border); }
.total-row.grand {
  font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 800;
  color: var(--gold); padding-top: 12px; margin-top: 4px;
  border-top: 2px solid var(--border);
}
.total-row label { color: var(--muted); font-size: .8rem; font-weight: 700; letter-spacing:.5px; }

/* ── TOTALS LAYOUT ── */
.bottom-area {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 20px; margin-top: 16px; flex-wrap: wrap;
}
.bottom-left { flex: 1; min-width: 200px; }
.discount-tax { display: flex; gap: 10px; flex-wrap: wrap; }
.discount-tax .field { flex: 1; min-width: 120px; }

/* ── INVOICE NUMBER BADGE ── */
.inv-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, rgba(124,106,247,.15), rgba(247,86,106,.1));
  border: 1px solid rgba(124,106,247,.3);
  border-radius: 50px; padding: 6px 16px;
  font-family: 'Syne', sans-serif; font-size: .85rem; font-weight: 800;
  color: var(--accent); margin-bottom: 20px;
  letter-spacing: 1px;
}

/* ── INVOICE PREVIEW ── */
#invoicePreview {
  background: #fff; color: #111;
  border-radius: 20px; overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,.4);
  font-family: 'Plus Jakarta Sans', sans-serif;
}
.inv-header {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  padding: 32px 36px; display: flex; justify-content: space-between; align-items: flex-start;
  gap: 20px;
}
.inv-header-left { flex: 1; }
.inv-logo-preview { max-height: 60px; max-width: 160px; object-fit: contain; margin-bottom: 10px; }
.inv-company { font-size: 1.3rem; font-weight: 900; color: #fff; font-family: 'Syne', sans-serif; }
.inv-company-detail { font-size: .78rem; color: rgba(255,255,255,.5); margin-top: 3px; }
.inv-header-right { text-align: right; }
.inv-title {
  font-family: 'Syne', sans-serif; font-size: 2.2rem; font-weight: 800;
  background: linear-gradient(135deg, #7c6af7, #f7566a);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; line-height: 1;
}
.inv-number { font-size: .8rem; color: rgba(255,255,255,.5); margin-top: 4px; font-weight: 600; }
.inv-date { font-size: .8rem; color: rgba(255,255,255,.4); margin-top: 2px; }

.inv-body { padding: 28px 36px; }
.inv-parties { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
.inv-party-label { font-size: .65rem; font-weight: 800; letter-spacing: 2px; color: #999; text-transform: uppercase; margin-bottom: 6px; }
.inv-party-name { font-size: 1rem; font-weight: 800; color: #111; }
.inv-party-detail { font-size: .8rem; color: #666; margin-top: 2px; line-height: 1.5; }

.inv-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: .85rem; }
.inv-table thead tr { background: linear-gradient(135deg, #7c6af7, #5b4fd4); }
.inv-table th { padding: 10px 14px; color: #fff; font-weight: 700; font-size: .72rem; letter-spacing: 1px; text-transform: uppercase; text-align: left; }
.inv-table th:last-child, .inv-table td:last-child { text-align: right; }
.inv-table tbody tr { border-bottom: 1px solid #f0f0f5; }
.inv-table tbody tr:nth-child(even) { background: #fafafa; }
.inv-table td { padding: 10px 14px; color: #333; }
.inv-table td:last-child { font-weight: 700; color: #1a1a2e; }

.inv-totals { display: flex; justify-content: flex-end; margin-bottom: 20px; }
.inv-totals-box { min-width: 260px; }
.inv-total-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: .85rem; border-bottom: 1px solid #f0f0f5; }
.inv-total-row label { color: #888; }
.inv-total-grand { display: flex; justify-content: space-between; padding: 12px 16px; margin-top: 4px; border-radius: 12px; background: linear-gradient(135deg, #1a1a2e, #16213e); }
.inv-total-grand label { color: rgba(255,255,255,.7); font-weight: 700; }
.inv-total-grand span { color: #f7c948; font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 800; }

.inv-notes { background: #f8f8fc; border-radius: 12px; padding: 14px 16px; margin-bottom: 20px; }
.inv-notes-label { font-size: .68rem; font-weight: 800; letter-spacing: 2px; color: #999; text-transform: uppercase; margin-bottom: 4px; }
.inv-notes-text { font-size: .82rem; color: #555; line-height: 1.6; }
.inv-footer { background: linear-gradient(135deg, #7c6af7, #f7566a); padding: 14px 36px; text-align: center; }
.inv-footer-text { color: rgba(255,255,255,.9); font-size: .78rem; font-weight: 600; }

/* ── HISTORY ── */
.history-empty { text-align: center; padding: 60px 20px; color: var(--muted); }
.history-empty span { font-size: 3rem; display: block; margin-bottom: 12px; }
.inv-list-item {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 16px 20px;
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 10px; transition: all .2s; cursor: pointer;
}
.inv-list-item:hover { border-color: var(--accent); transform: translateX(4px); }
.inv-list-num {
  font-family: 'Syne', sans-serif; font-size: .8rem; font-weight: 800;
  color: var(--accent); min-width: 110px;
}
.inv-list-client { flex: 1; font-weight: 700; }
.inv-list-date { font-size: .78rem; color: var(--muted); }
.inv-list-amount {
  font-family: 'Syne', sans-serif; font-weight: 800;
  color: var(--gold); font-size: 1rem;
}
.inv-list-actions { display: flex; gap: 6px; }

/* STATUS BADGE */
.status-badge {
  font-size: .65rem; font-weight: 800; letter-spacing: 1px;
  padding: 3px 10px; border-radius: 50px; text-transform: uppercase;
}
.status-unpaid { background: rgba(247,86,106,.15); color: var(--accent2); }
.status-paid { background: rgba(56,232,160,.15); color: var(--success); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.7);
  backdrop-filter: blur(6px); z-index: 100;
  display: none; align-items: center; justify-content: center; padding: 16px;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 24px; padding: 28px; width: 100%; max-width: 420px;
  animation: fadeIn .25s ease;
}
.modal h3 { font-family: 'Syne', sans-serif; font-size: 1.2rem; margin-bottom: 6px; }
.modal p { color: var(--muted); font-size: .85rem; margin-bottom: 20px; }

/* ── PRINT ── */
@media print {
  body * { visibility: hidden; }
  #invoicePreview, #invoicePreview * { visibility: visible; }
  #invoicePreview { position: fixed; inset: 0; border-radius: 0; box-shadow: none; }
}

@media (max-width: 600px) {
  .form-grid { grid-template-columns: 1fr; }
  .form-grid.three { grid-template-columns: 1fr 1fr; }
  .inv-parties { grid-template-columns: 1fr; }
  .inv-header { flex-direction: column; }
  .inv-header-right { text-align: left; }
  .bottom-area { flex-direction: column; }
}
</style>
</head>
<body>
<div class="blob1"></div>
<div class="blob2"></div>

<div id="app">

  <!-- HEADER -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px;">
    <div>
      <div style="font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;line-height:1;">
        Invoice <span style="background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Generator</span>
      </div>
      <div style="color:var(--muted);font-size:.8rem;margin-top:3px;">Buat, simpan & cetak invoice profesional</div>
    </div>
    <div class="inv-badge">📄 INV-<span id="invNumDisplay">001</span></div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('buat')">✏️ Buat Invoice</button>
    <button class="tab" onclick="switchTab('preview')">👁️ Preview</button>
    <button class="tab" onclick="switchTab('history')">📋 History</button>
  </div>

  <!-- ══ TAB: BUAT ══ -->
  <div class="section active" id="tab-buat">
    <div style="display:grid;gap:16px;">

      <!-- Bisnis Info -->
      <div class="card">
        <div class="card-title">🏢 Info Bisnis Kamu</div>
        <div class="form-grid">
          <div class="field form-full">
            <label>Logo</label>
            <div class="logo-area" id="logoArea" onclick="document.getElementById('logoInput').click()">
              <input type="file" id="logoInput" accept="image/*" onchange="loadLogo(event)">
              <div class="logo-placeholder" id="logoPlaceholder">
                <span>🖼️</span>
                Klik untuk upload logo
              </div>
              <img id="logoPreview" style="display:none">
            </div>
          </div>
          <div class="field">
            <label>Nama Bisnis / Toko *</label>
            <input type="text" id="bizName" placeholder="Toko Saya Jaya" value="">
          </div>
          <div class="field">
            <label>Tagline / Jenis Usaha</label>
            <input type="text" id="bizTagline" placeholder="Produk & Jasa Terbaik">
          </div>
          <div class="field">
            <label>No. Telepon / WhatsApp</label>
            <input type="text" id="bizPhone" placeholder="0812-3456-7890">
          </div>
          <div class="field">
            <label>Email</label>
            <input type="text" id="bizEmail" placeholder="toko@email.com">
          </div>
          <div class="field form-full">
            <label>Alamat</label>
            <textarea id="bizAddress" placeholder="Jl. Contoh No. 123, Kota"></textarea>
          </div>
        </div>
      </div>

      <!-- Invoice Info -->
      <div class="card">
        <div class="card-title">📄 Detail Invoice</div>
        <div class="form-grid three">
          <div class="field">
            <label>No. Invoice</label>
            <input type="text" id="invNumber" value="INV-001" oninput="document.getElementById('invNumDisplay').textContent=this.value.replace('INV-','')">
          </div>
          <div class="field">
            <label>Tanggal</label>
            <input type="date" id="invDate">
          </div>
          <div class="field">
            <label>Jatuh Tempo</label>
            <input type="date" id="invDue">
          </div>
        </div>
      </div>

      <!-- Client Info -->
      <div class="card">
        <div class="card-title">👤 Info Pelanggan</div>
        <div class="form-grid">
          <div class="field">
            <label>Nama Pelanggan *</label>
            <input type="text" id="clientName" placeholder="Budi Santoso">
          </div>
          <div class="field">
            <label>No. Telepon</label>
            <input type="text" id="clientPhone" placeholder="0812-0000-0000">
          </div>
          <div class="field form-full">
            <label>Alamat Pelanggan</label>
            <textarea id="clientAddress" placeholder="Jl. Pembeli No. 1, Kota"></textarea>
          </div>
        </div>
      </div>

      <!-- Items -->
      <div class="card">
        <div class="card-title">🛒 Item / Produk</div>
        <div class="items-wrap">
          <table class="items-table">
            <thead>
              <tr>
                <th style="width:35%">Nama Item</th>
                <th style="width:15%">Jenis</th>
                <th style="width:12%">Qty</th>
                <th style="width:18%">Harga Satuan</th>
                <th style="width:15%">Subtotal</th>
                <th style="width:5%"></th>
              </tr>
            </thead>
            <tbody id="itemsBody"></tbody>
          </table>
        </div>
        <button class="btn btn-add-item" onclick="addItem()">＋ Tambah Item</button>

        <!-- Totals -->
        <div class="bottom-area">
          <div class="bottom-left">
            <div class="field" style="margin-bottom:12px;">
              <label>Catatan / Keterangan</label>
              <textarea id="invNotes" placeholder="Terima kasih atas kepercayaan Anda! Pembayaran via transfer BCA 1234567890 a/n Nama Toko."></textarea>
            </div>
            <div class="discount-tax">
              <div class="field">
                <label>Diskon (%)</label>
                <input type="number" id="discountPct" value="0" min="0" max="100" oninput="calcTotals()">
              </div>
              <div class="field">
                <label>PPN (%)</label>
                <input type="number" id="taxPct" value="0" min="0" max="100" oninput="calcTotals()">
              </div>
            </div>
          </div>
          <div class="totals-box">
            <div class="total-row"><label>Subtotal</label><span id="totSubtotal">Rp 0</span></div>
            <div class="total-row"><label>Diskon</label><span id="totDiscount" style="color:var(--accent2)">- Rp 0</span></div>
            <div class="total-row"><label>PPN</label><span id="totTax">+ Rp 0</span></div>
            <div class="total-row grand"><label>TOTAL</label><span id="totGrand">Rp 0</span></div>
          </div>
        </div>

        <div class="btn-row" style="margin-top:20px;">
          <button class="btn btn-primary" onclick="generatePreview()">👁️ Preview Invoice</button>
          <button class="btn btn-success" onclick="saveInvoice()">💾 Simpan Invoice</button>
          <button class="btn btn-secondary" onclick="resetForm()">🔄 Reset</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ TAB: PREVIEW ══ -->
  <div class="section" id="tab-preview">
    <div class="btn-row" style="margin-bottom:16px;">
      <button class="btn btn-primary" onclick="window.print()">🖨️ Print / Save PDF</button>
      <button class="btn btn-success" onclick="saveInvoice()">💾 Simpan</button>
      <button class="btn btn-secondary" onclick="switchTab('buat')">✏️ Edit</button>
    </div>
    <div id="invoicePreview">
      <!-- Generated by JS -->
    </div>
  </div>

  <!-- ══ TAB: HISTORY ══ -->
  <div class="section" id="tab-history">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
      <div style="font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;">Semua Invoice</div>
      <button class="btn btn-danger" onclick="clearHistory()">🗑️ Hapus Semua</button>
    </div>
    <div id="historyList"></div>
  </div>

</div>

<!-- MODAL KONFIRMASI -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <h3 id="modalTitle">Konfirmasi</h3>
    <p id="modalMsg">Yakin?</p>
    <div class="btn-row">
      <button class="btn btn-danger" id="modalConfirm">Ya, Lanjutkan</button>
      <button class="btn btn-secondary" onclick="closeModal()">Batal</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let items = [];
let logoDataUrl = '';
let invoices = JSON.parse(localStorage.getItem('invoices') || '[]');
let editingId = null;

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', ()=>{
  // Set today's date
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('invDate').value = today;
  // Due date = 7 days later
  const due = new Date(); due.setDate(due.getDate()+7);
  document.getElementById('invDue').value = due.toISOString().split('T')[0];
  // Auto invoice number
  autoInvNumber();
  // Add first item
  addItem();
  // Render history
  renderHistory();
});

function autoInvNumber(){
  const num = (invoices.length + 1).toString().padStart(3,'0');
  const val = `INV-${num}`;
  document.getElementById('invNumber').value = val;
  document.getElementById('invNumDisplay').textContent = num;
}

// ══════════════════════════════════════════
// TABS
// ══════════════════════════════════════════
function switchTab(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  event.target.classList.add('active');
  if(id==='preview') generatePreview();
  if(id==='history') renderHistory();
}

// ══════════════════════════════════════════
// LOGO
// ══════════════════════════════════════════
function loadLogo(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = r => {
    logoDataUrl = r.target.result;
    document.getElementById('logoPreview').src = logoDataUrl;
    document.getElementById('logoPreview').style.display = 'block';
    document.getElementById('logoPlaceholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

// ══════════════════════════════════════════
// ITEMS
// ══════════════════════════════════════════
function addItem(){
  const id = Date.now();
  items.push({id, name:'', type:'Produk', qty:1, price:0});
  renderItems();
}

function removeItem(id){
  items = items.filter(i=>i.id!==id);
  renderItems();
  calcTotals();
}

function renderItems(){
  const tbody = document.getElementById('itemsBody');
  tbody.innerHTML = '';
  items.forEach((item, idx)=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="text" placeholder="Nama produk/jasa" value="${item.name}" oninput="updateItem(${item.id},'name',this.value)"></td>
      <td>
        <select style="background:var(--card2);border:1.5px solid var(--border);border-radius:8px;padding:8px;color:var(--text);font-family:inherit;font-size:.85rem;outline:none;width:100%"
          onchange="updateItem(${item.id},'type',this.value)">
          <option ${item.type==='Produk'?'selected':''}>Produk</option>
          <option ${item.type==='Jasa'?'selected':''}>Jasa</option>
        </select>
      </td>
      <td><input type="number" min="1" value="${item.qty}" oninput="updateItem(${item.id},'qty',+this.value);calcTotals()" style="text-align:center"></td>
      <td><input type="number" min="0" value="${item.price}" placeholder="0" oninput="updateItem(${item.id},'price',+this.value);calcTotals()" style="text-align:right"></td>
      <td class="item-subtotal">${fmtRp(item.qty * item.price)}</td>
      <td><button class="btn-del" onclick="removeItem(${item.id})">✕</button></td>
    `;
    tbody.appendChild(tr);
  });
  calcTotals();
}

function updateItem(id, field, val){
  const item = items.find(i=>i.id===id);
  if(item) item[field] = val;
  // Update subtotal cell
  renderItems();
}

// ══════════════════════════════════════════
// TOTALS
// ══════════════════════════════════════════
function calcTotals(){
  const subtotal = items.reduce((s,i)=>s+i.qty*i.price, 0);
  const discPct = +document.getElementById('discountPct').value || 0;
  const taxPct  = +document.getElementById('taxPct').value  || 0;
  const disc  = subtotal * discPct / 100;
  const tax   = (subtotal - disc) * taxPct / 100;
  const grand = subtotal - disc + tax;

  document.getElementById('totSubtotal').textContent = fmtRp(subtotal);
  document.getElementById('totDiscount').textContent = `- ${fmtRp(disc)}`;
  document.getElementById('totTax').textContent      = `+ ${fmtRp(tax)}`;
  document.getElementById('totGrand').textContent    = fmtRp(grand);
  return {subtotal, disc, tax, grand};
}

function fmtRp(n){
  return 'Rp ' + Math.round(n).toLocaleString('id-ID');
}

// ══════════════════════════════════════════
// COLLECT FORM DATA
// ══════════════════════════════════════════
function collectData(){
  const totals = calcTotals();
  return {
    id: editingId || Date.now(),
    invNumber: document.getElementById('invNumber').value,
    invDate:   document.getElementById('invDate').value,
    invDue:    document.getElementById('invDue').value,
    bizName:   document.getElementById('bizName').value || 'Nama Bisnis',
    bizTagline:document.getElementById('bizTagline').value,
    bizPhone:  document.getElementById('bizPhone').value,
    bizEmail:  document.getElementById('bizEmail').value,
    bizAddress:document.getElementById('bizAddress').value,
    clientName:   document.getElementById('clientName').value || 'Nama Pelanggan',
    clientPhone:  document.getElementById('clientPhone').value,
    clientAddress:document.getElementById('clientAddress').value,
    notes:     document.getElementById('invNotes').value,
    discountPct: +document.getElementById('discountPct').value || 0,
    taxPct:      +document.getElementById('taxPct').value || 0,
    items: [...items],
    logo: logoDataUrl,
    status: 'unpaid',
    ...totals,
    savedAt: new Date().toLocaleDateString('id-ID', {day:'2-digit',month:'short',year:'numeric'})
  };
}

// ══════════════════════════════════════════
// GENERATE PREVIEW
// ══════════════════════════════════════════
function generatePreview(){
  const d = collectData();
  const logoHtml = d.logo
    ? `<img src="${d.logo}" class="inv-logo-preview">`
    : `<div style="font-size:2rem;margin-bottom:8px">🏪</div>`;

  const rowsHtml = d.items.map(i=>`
    <tr>
      <td>${i.name||'—'}</td>
      <td><span style="background:${i.type==='Jasa'?'rgba(124,106,247,.15)':'rgba(56,232,164,.15)'};color:${i.type==='Jasa'?'#7c6af7':'#38e8a0'};padding:2px 8px;border-radius:50px;font-size:.72rem;font-weight:700">${i.type}</span></td>
      <td style="text-align:center">${i.qty}</td>
      <td style="text-align:right">${fmtRp(i.price)}</td>
      <td>${fmtRp(i.qty*i.price)}</td>
    </tr>
  `).join('');

  const discRow  = d.discountPct > 0 ? `<div class="inv-total-row"><label>Diskon (${d.discountPct}%)</label><span style="color:#f7566a">- ${fmtRp(d.disc)}</span></div>` : '';
  const taxRow   = d.taxPct > 0      ? `<div class="inv-total-row"><label>PPN (${d.taxPct}%)</label><span>+ ${fmtRp(d.tax)}</span></div>` : '';
  const notesHtml = d.notes ? `<div class="inv-notes"><div class="inv-notes-label">Catatan</div><div class="inv-notes-text">${d.notes.replace(/\n/g,'<br>')}</div></div>` : '';
  const dueHtml  = d.invDue ? `<div class="inv-date">Jatuh Tempo: ${fmtDate(d.invDue)}</div>` : '';

  document.getElementById('invoicePreview').innerHTML = `
    <div class="inv-header">
      <div class="inv-header-left">
        ${logoHtml}
        <div class="inv-company">${d.bizName}</div>
        ${d.bizTagline?`<div class="inv-company-detail">${d.bizTagline}</div>`:''}
        ${d.bizPhone?`<div class="inv-company-detail">📞 ${d.bizPhone}</div>`:''}
        ${d.bizEmail?`<div class="inv-company-detail">✉️ ${d.bizEmail}</div>`:''}
        ${d.bizAddress?`<div class="inv-company-detail">📍 ${d.bizAddress.replace(/\n/g,', ')}</div>`:''}
      </div>
      <div class="inv-header-right">
        <div class="inv-title">INVOICE</div>
        <div class="inv-number"># ${d.invNumber}</div>
        <div class="inv-date">Tanggal: ${fmtDate(d.invDate)}</div>
        ${dueHtml}
      </div>
    </div>
    <div class="inv-body">
      <div class="inv-parties">
        <div>
          <div class="inv-party-label">Dari</div>
          <div class="inv-party-name">${d.bizName}</div>
          ${d.bizAddress?`<div class="inv-party-detail">${d.bizAddress.replace(/\n/g,'<br>')}</div>`:''}
        </div>
        <div>
          <div class="inv-party-label">Kepada</div>
          <div class="inv-party-name">${d.clientName}</div>
          ${d.clientPhone?`<div class="inv-party-detail">📞 ${d.clientPhone}</div>`:''}
          ${d.clientAddress?`<div class="inv-party-detail">${d.clientAddress.replace(/\n/g,'<br>')}</div>`:''}
        </div>
      </div>
      <table class="inv-table">
        <thead><tr>
          <th>Nama Item</th><th>Jenis</th><th style="text-align:center">Qty</th>
          <th style="text-align:right">Harga</th><th style="text-align:right">Subtotal</th>
        </tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>
      <div class="inv-totals">
        <div class="inv-totals-box">
          <div class="inv-total-row"><label>Subtotal</label><span>${fmtRp(d.subtotal)}</span></div>
          ${discRow}${taxRow}
          <div class="inv-total-grand">
            <label>TOTAL</label>
            <span>${fmtRp(d.grand)}</span>
          </div>
        </div>
      </div>
      ${notesHtml}
    </div>
    <div class="inv-footer">
      <div class="inv-footer-text">Terima kasih telah berbisnis dengan ${d.bizName} 🙏</div>
    </div>
  `;
}

function fmtDate(str){
  if(!str) return '—';
  const d = new Date(str);
  return d.toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'});
}

// ══════════════════════════════════════════
// SAVE & HISTORY
// ══════════════════════════════════════════
function saveInvoice(){
  generatePreview();
  const data = collectData();
  const idx = invoices.findIndex(i=>i.id===data.id);
  if(idx>=0) invoices[idx]=data;
  else invoices.unshift(data);
  localStorage.setItem('invoices', JSON.stringify(invoices));
  // Flash feedback
  const btn = event.target;
  const orig = btn.innerHTML;
  btn.innerHTML = '✅ Tersimpan!';
  btn.style.background = 'linear-gradient(135deg,#1db87a,#16a86f)';
  setTimeout(()=>{ btn.innerHTML=orig; btn.style.background=''; }, 1800);
  renderHistory();
}

function renderHistory(){
  const el = document.getElementById('historyList');
  if(!invoices.length){
    el.innerHTML = `<div class="history-empty"><span>📄</span>Belum ada invoice tersimpan</div>`;
    return;
  }
  el.innerHTML = invoices.map(inv=>`
    <div class="inv-list-item" onclick="loadInvoice(${inv.id})">
      <div class="inv-list-num">${inv.invNumber}</div>
      <div style="flex:1">
        <div class="inv-list-client">${inv.clientName}</div>
        <div class="inv-list-date">${inv.savedAt}</div>
      </div>
      <span class="status-badge status-${inv.status}">${inv.status==='paid'?'Lunas':'Belum Lunas'}</span>
      <div class="inv-list-amount">${fmtRp(inv.grand)}</div>
      <div class="inv-list-actions" onclick="event.stopPropagation()">
        <button class="btn btn-success" style="padding:6px 12px;font-size:.75rem" onclick="togglePaid(${inv.id})">
          ${inv.status==='paid'?'↩ Batal':'✓ Lunas'}
        </button>
        <button class="btn btn-danger" style="padding:6px 10px;font-size:.75rem" onclick="deleteInvoice(${inv.id})">🗑</button>
      </div>
    </div>
  `).join('');
}

function loadInvoice(id){
  const inv = invoices.find(i=>i.id===id);
  if(!inv) return;
  editingId = inv.id;
  // Fill form
  document.getElementById('bizName').value    = inv.bizName||'';
  document.getElementById('bizTagline').value = inv.bizTagline||'';
  document.getElementById('bizPhone').value   = inv.bizPhone||'';
  document.getElementById('bizEmail').value   = inv.bizEmail||'';
  document.getElementById('bizAddress').value = inv.bizAddress||'';
  document.getElementById('invNumber').value  = inv.invNumber||'';
  document.getElementById('invDate').value    = inv.invDate||'';
  document.getElementById('invDue').value     = inv.invDue||'';
  document.getElementById('clientName').value   = inv.clientName||'';
  document.getElementById('clientPhone').value  = inv.clientPhone||'';
  document.getElementById('clientAddress').value= inv.clientAddress||'';
  document.getElementById('invNotes').value   = inv.notes||'';
  document.getElementById('discountPct').value= inv.discountPct||0;
  document.getElementById('taxPct').value     = inv.taxPct||0;
  if(inv.logo){ logoDataUrl=inv.logo; document.getElementById('logoPreview').src=inv.logo; document.getElementById('logoPreview').style.display='block'; document.getElementById('logoPlaceholder').style.display='none'; }
  items = inv.items.map(i=>({...i, id:i.id||Date.now()+Math.random()}));
  renderItems();
  switchTabDirect('buat');
  document.querySelectorAll('.tab')[0].classList.add('active');
  document.querySelectorAll('.tab')[1].classList.remove('active');
  document.querySelectorAll('.tab')[2].classList.remove('active');
}

function switchTabDirect(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
}

function togglePaid(id){
  const inv = invoices.find(i=>i.id===id);
  if(inv) inv.status = inv.status==='paid'?'unpaid':'paid';
  localStorage.setItem('invoices', JSON.stringify(invoices));
  renderHistory();
}

function deleteInvoice(id){
  showModal('Hapus Invoice', 'Invoice ini akan dihapus permanen.', ()=>{
    invoices = invoices.filter(i=>i.id!==id);
    localStorage.setItem('invoices', JSON.stringify(invoices));
    renderHistory();
  });
}

function clearHistory(){
  showModal('Hapus Semua', 'Semua invoice akan dihapus permanen!', ()=>{
    invoices=[];
    localStorage.setItem('invoices', JSON.stringify(invoices));
    renderHistory();
  });
}

function resetForm(){
  editingId = null;
  document.getElementById('bizName').value='';
  document.getElementById('bizTagline').value='';
  document.getElementById('bizPhone').value='';
  document.getElementById('bizEmail').value='';
  document.getElementById('bizAddress').value='';
  document.getElementById('clientName').value='';
  document.getElementById('clientPhone').value='';
  document.getElementById('clientAddress').value='';
  document.getElementById('invNotes').value='';
  document.getElementById('discountPct').value=0;
  document.getElementById('taxPct').value=0;
  logoDataUrl='';
  document.getElementById('logoPreview').style.display='none';
  document.getElementById('logoPlaceholder').style.display='';
  items=[];
  autoInvNumber();
  addItem();
  calcTotals();
}

// ══════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════
let modalCb = null;
function showModal(title, msg, cb){
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalMsg').textContent = msg;
  modalCb = cb;
  document.getElementById('confirmModal').classList.add('show');
}
document.getElementById('modalConfirm').onclick = ()=>{ if(modalCb) modalCb(); closeModal(); };
function closeModal(){ document.getElementById('confirmModal').classList.remove('show'); }
</script>
</body>
</html>
